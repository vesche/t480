###########
# POLYBAR #
###########


[colors]
black = #000000
white = #faebd7
red = #f00f0f
yellow = #e3e910
blue = #387d8c
blue-bright = #5ba3d0
purple = #ae3bd7
orange = #ff9800
green = #0ce819
dim = #555555


[bar/frame0bar]
override-redirect = true
wm-restack = bspwm

monitor = ${env:MONITOR:eDP-1}

width = 100%
height = 40
offset-x = 0
offset-y = 0

background = ${colors.black}
foreground = ${colors.white}
radius = 4

underline-size = 2
underline-color = ${colors.purple}

spacing = 1
padding-left = 1
padding-right = 1
module-margin-left = 0
module-margin-right = 0

font-0 = Source Code Pro Medium:size=16;2
font-1 = FontAwesome:size=14;2

modules-left = bspwm
modules-right = wlan sep battery1 sep backlight sep volume sep date

fixed-center = true
tray-position = none


[module/bspwm]
type = internal/bspwm

pin-workspaces = true

ws-icon-0 = I;1
ws-icon-1 = II;2
ws-icon-2 = III;3
ws-icon-3 = IV;4
ws-icon-4 = V;5
ws-icon-5 = VI;6
ws-icon-6 = VII;7
ws-icon-7 = VIII;8
ws-icon-8 = IX;9

format = <label-state>

label-focused = %icon%
label-focused-underline = ${colors.purple}
label-focused-padding = 1

label-empty = %icon%
label-empty-foreground = ${colors.dim}
label-empty-padding = 1

label-occupied = %icon%
label-occupied-foreground = ${colors.dim}
label-occupied-padding = 1

label-urgent = %icon%
label-urgent-background = ${colors.yellow}
label-urgent-padding = 1


[module/sep]
type = custom/text
content = " │ "
content-foreground = ${colors.dim}


[module/date]
type = internal/date
interval = 10
date = %a %b %d, 
time = %H:%M
label = %date% %time%
format =  <label>
format-foreground = ${colors.purple}
format-padding = 0


[module/volume]
type = internal/alsa
format-volume = <ramp-volume><label-volume>
format-muted = <label-muted>
label-volume = %percentage:02%%
label-muted =  mute
format-volume-foreground = ${colors.green}
label-muted-foreground = ${colors.red}
format-volume-padding = 0
format-muted-padding = 1

; Use same icon for all levels to prevent layout shift when scrolling
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-headphones-0 = 


[module/backlight]
type = internal/backlight
card = intel_backlight
enable-scroll = true
format = <ramp><label>
label = "%percentage:02%%"
format-foreground = ${colors.dim}
format-padding = 0
ramp-0 = 
ramp-1 = 
ramp-2 = 


[module/battery1]
type = custom/script
exec = /home/user/.config/polybar/battery.sh
interval = 30
format = <label>
format-foreground = ${colors.orange}
format-padding = 0


[module/wlan]
type = internal/network
interface = wlp170s0
interval = 30
label-connected = " %essid%"
label-disconnected = " No Internet"
format-connected-foreground = ${colors.blue-bright}
format-disconnected-foreground = ${colors.red}
format-padding = 0

